name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Engine syntax check
        run: node .github/scripts/check-syntax.mjs
      - name: Data sanity check
        run: node .github/scripts/check-data.mjs
      - name: Link check (README)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md
          fail: true
